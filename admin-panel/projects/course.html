<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Course</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <script src="js/loadPartials.js" defer></script>
  <script src="js/sidebarToggle.js" defer></script>
  <script src="js/course.js" defer></script>
</head>

<body>
<div class="container-fluid">
  <div class="column">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

  <div id="main" class="p-5">
    <!-- Main-->
    <div class="container mt-5 position-relative">
      <div class="d-flex justify-content-end">
          <a href="/viewCourses" class="btn btn-primary mt-3">View Courses</a>
      </div>
     
      <h2 class="mb-4 text-center">Add Course/Grade</h2>
    <div class="card shadow-sm p-4">
      <form id="courseForm">
        <div class="mb-3">
         <label for="courseName" class="form-label">Course/Grade Name</label>
         <input type="text" id="courseName" class="form-control" placeholder="Enter course name" required>
        </div>

        <div class="mb-3">
          <label for="academicSelect" class="form-label">Select Academic</label>
          <select id="academicSelect" class="form-select" required>
            <option value="">Choose Academic</option>
          </select>
        </div>
          <button type="submit" class="btn btn-success">Add Course/Grade</button>
      </form>
    </div>
    </div>
  </div>
    
    <div id="footer-container"></div>

  </div>
</div>
</body>
</html>
