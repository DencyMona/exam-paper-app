<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Subjects</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <script src="js/loadPartials.js" defer></script>
  <script src="js/sidebarToggle.js" defer></script>
  <script src="js/viewSubject.js" defer></script>
</head>
<body>
  <div class="container-fluid">
    <div class="column">

      <div id="sidebar-container"></div>
      <div id="header-container"></div>

    <div id="main" class="p-5">
      <!-- Main -->
      <div class="container mt-5 position-relative">
        <div class="d-flex justify-content-end">
          <a href="/subject" class="btn btn-primary mt-3">Add New Subject</a>
      </div>
        
        <h2 class="mb-4 text-center">View Subjects</h2>
      <div class="row mb-3">
        <div class="col-md-4">
          <label for="academicSelect" class="form-label">Select Academic</label>
          <select id="academicSelect" class="form-select">
            <option value="">-- Choose Academic --</option>
          </select>
        </div>
      <div class="col-md-4">
        <label for="courseSelect" class="form-label">Select Course</label>
        <select id="courseSelect" class="form-select">
          <option value="">-- Choose Course --</option>
        </select>
      </div>
      <div class="col-md-4">
        <label for="yearSelect" class="form-label">Select Year</label>
        <select id="yearSelect" class="form-select">
         <option value="">-- Choose Year --</option>
        </select>
      </div>
      </div>

    <div class="card shadow-sm p-4">
  <div class="mb-3">
    <input type="text" id="searchInput" class="form-control" placeholder="Search....">
  </div>

  <div class="table-responsive">
    <table class="table table-bordered table-striped mb-0" id="subjectTable">
      <thead class="table-light">
        <tr>
          <th>Subject ID</th>
          <th>Subject Name</th>
          <th>Academic Name</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="4" class="text-center">No subjects found</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

    </div>
    </div>

      <div id="footer-container"></div>

    </div>
  </div>
</body>
</html>
