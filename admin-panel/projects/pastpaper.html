<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Exam Paper</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <script src="js/loadPartials.js" defer></script>
  <script src="js/sidebarToggle.js" defer></script>
  <script src="js/pastpaper.js" defer></script>
</head>
<body>
  <div class="container-fluid">
    <div class="column">

      <div id="sidebar-container"></div>
      <div id="header-container"></div>

    <div id="main" class="p-5">
      <!-- Main-->
      <div class="container mt-5 position-relative">
        <div class="d-flex justify-content-end">
          <a href="/viewPastpaper" class="btn btn-primary mt-3">View Papers</a>
      </div>
       
        <h2 class="mb-4 text-center">Add Past Exam Paper</h2>
      <div class="card shadow-sm p-4">
        <form id="pastPaperForm" enctype="multipart/form-data">
          <div class="mb-3">
            <p><strong>Academic:</strong> <span id="academicName">Loading...</span></p>
            <p><strong>Course:</strong> <span id="courseName">Loading...</span></p>
            <p><strong>Year:</strong> <span id="yearName">Loading...</span></p>
          </div>
          <hr>
          <div class="mb-3">
            <label for="examYear" class="form-label">Exam Year</label>
            <input type="number" id="examYear" name="examYear" class="form-control" placeholder="e.g. 2025" required>
          </div>
          <div class="mb-3">
            <label for="paperFile" class="form-label">Upload Exam Paper (PDF)</label>
            <input type="file" id="paperFile" name="paperFile" class="form-control" accept=".pdf" required>
          </div>
            <button type="submit" class="btn btn-success">Add Paper</button>
        </form>
      </div>
      </div>
    </div>

      <div id="footer-container"></div>

    </div>
  </div>
</body>
</html>
