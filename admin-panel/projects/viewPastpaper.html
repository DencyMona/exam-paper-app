<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Past Papers</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <script src="js/loadPartials.js" defer></script>
  <script src="js/sidebarToggle.js" defer></script>
  <script src="js/viewPastpaper.js" defer></script>
</head>
<body>
   <div class="container-fluid">
    <div class="column">

      <div id="sidebar-container"></div>
      <div id="header-container"></div>

    <div id="main" class="p-5">
      <!-- Main -->
      <div class="container mt-5">
       <h2 class="mb-4 text-center ">Past Exam Papers</h2>
       <div class="d-flex justify-content-end">
          <a href="/subject" class="btn btn-primary mt-3 mb-4">Back to Subjects</a>
      </div>
      
      <div class="card shadow-sm p-4">
  <div class="mb-3">
    <input type="text" id="searchInput" class="form-control" placeholder="Search ....">
  </div>

  <div class="table-responsive">
    <table class="table table-bordered table-striped" id="pastpaperTable">
      <thead class="table-light">
        <tr>
          <th>#</th>
          <th>Subject</th>
          <th>Exam Year</th>
          <th>File</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="5" class="text-center">Loading past papers...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

    </div>
    </div>
      
      <div id="footer-container"></div>

   </div>
</body>
</html>
