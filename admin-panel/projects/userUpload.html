<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Uploaded Papers</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
 <link href="css/style.css" rel="stylesheet">
   <script src="js/loadPartials.js" defer></script>
  <script src="js/sidebarToggle.js" defer></script>
  <script src="js/userUpload.js" defer></script>
<body>
  <div class="container-fluid">
    <div class="column">

      <!-- Sidebar & Header -->
      <div id="sidebar-container"></div>
      <div id="header-container"></div>

      <!-- Main Content -->
      <div id="main" class="p-5">
        <div class="container mt-5">
          <h2 class="mb-4 text-center">User Uploaded Papers</h2>

          <div class="d-flex justify-content-end">
            <a href="/dashboard" class="btn btn-primary mt-3 mb-4">Back to Dashboard</a>
          </div>

          <div class="card shadow-sm p-4">
            <div class="mb-3">
              <input type="text" id="searchInput" class="form-control" placeholder="Search uploaded papers...">
            </div>

            <div class="table-responsive">
              <table class="table table-bordered table-striped align-middle text-center" id="papersTable">
                <thead>
                  <tr>
                    <th>#</th>
                    <th>Academic</th>
                    <th>Course</th>
                    <th>Year</th>
                    <th>Subject</th>
                    <th>Exam Year</th>
                    <th>File</th>
                    <th>Uploaded At</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="papersTableBody">
                  <tr>
                    <td colspan="9" class="text-center">Loading uploaded papers...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

        </div>
      </div>

      <!-- Footer -->
      <div id="footer-container"></div>
</div>
  </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
