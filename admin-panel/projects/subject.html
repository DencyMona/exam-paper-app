<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Subject</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <script src="js/loadPartials.js" defer></script>
  <script src="js/sidebarToggle.js" defer></script>
  <script src="js/subject.js" defer></script>
</head>
<body>
<div class="container-fluid">
    <div class="column">

      <div id="sidebar-container"></div>
      <div id="header-container"></div>

    <div id="main" class="p-5">
      <!-- Main -->
      <div class="container mt-5 position-relative">
        <div class="d-flex justify-content-end">
          <a href="/viewSubject" class="btn btn-primary mt-3">View Subjects</a>
      </div>
       
        <h2 class="mb-4 text-center">Add Subject</h2>
      <div class="card shadow-sm p-4">
        <form id="subjectForm">
          <div class="mb-3">
            <label for="subjectName" class="form-label">Subject Name</label>
            <input type="text" id="subjectName" class="form-control" placeholder="Enter subject name" required>
          </div>

          <div class="row mb-3">
            <div class="col-md-4">
              <label for="academicSelect" class="form-label">Select Academic</label>
              <select id="academicSelect" class="form-select" required>
                <option value="">Choose Academic</option>
              </select>
            </div>
          <div class="col-md-4">
            <label for="courseSelect" class="form-label">Select Course</label>
            <select id="courseSelect" class="form-select" required>
             <option value="">Choose Course</option>
            </select>
          </div>
           <div class="col-md-4">
            <label for="yearSelect" class="form-label">Select Year</label>
             <select id="yearSelect" class="form-select" required>
              <option value="">Choose Year</option>
             </select>
           </div>
        </div>
         <button type="submit" class="btn btn-success">Add Subject</button>
      </div>
      </div>
    </div>

      <div id="footer-container"></div>

    </div>
  </div>
</body>
</html>
