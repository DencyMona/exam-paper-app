
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="login-container d-flex justify-content-center align-items-center">
    <div class="login-card row shadow">  
      
      <div class="col-md-12 login-left p-5 ">
        <h2 class="text-white fw-bold mb-4">Login</h2>
        <form method="POST" action="/login">
          <div class="mb-3">
           <label for="username" class="form-label text-white">Username</label>
            <div class="input-group">
             <input type="text" id="username" name="username" class="form-control input-custom" placeholder="Username" required>
             <span class="input-group-text input-custom"><i class="bi bi-person"></i></span>
            </div>
          </div>

          <div class="mb-4">
            <label for="password" class="form-label text-white">Password</label>
              <div class="input-group">
                <input type="password" id="password" name="password" class="form-control input-custom" placeholder="Password" required>
                <span class="input-group-text input-custom"><i class="bi bi-lock"></i></span>
              </div>
          </div>

          <button type="submit" class="btn btn-login w-50 mb-3">Login</button>

        </form>

      </div>
    </div>
</div>
  <script src="js/script.js"></script>
</body>
</html>
