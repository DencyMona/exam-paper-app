<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Courses</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <script src="js/loadPartials.js" defer></script>
  <script src="js/sidebarToggle.js" defer></script>
  <script src="js/viewCourses.js" defer></script>
</head>

<body>
<div class="container-fluid">
  <div class="column">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

  <div id="main" class="p-5">
    <!-- Main -->
    <div class="container mt-5 position-relative">
      <div class="d-flex justify-content-end">
          <a href="/course" class="btn btn-primary mt-3">Add New Course</a>
      </div>
     <h2 class="mb-4 text-center">View Courses/Grades</h2>

    <div class="mb-3">
     <label for="academicSelect" class="form-label">Select Academic</label>
     <select id="academicSelect" class="form-select">
      <option value="">-- Choose Academic --</option>
     </select>
    </div>

    <div class="card shadow-sm p-4">
  <div class="table-responsive">
    <table class="table table-bordered table-striped mb-0" id="coursesTable">
      <thead class="table-light">
        <tr>
          <th>Course ID</th>
          <th>Course/Grade Name</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="3" class="text-center">No courses found</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

    </div>

      <div id="footer-container"></div>

  </div>
</div>
</body>
</html>
