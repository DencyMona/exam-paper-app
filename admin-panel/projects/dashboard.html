<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
  <script src="js/dashboard.js" defer></script>
</head>
<body>

<div class="container-fluid">
  <div class="column">

    <!-- Sidebar -->
    <div id="sidebar" class="p-0 m-0">
      <div class="d-flex align-items-center p-3 m-0">
        <span class="logo-text fw-bold fs-4">Lanka Ex Paper</span>
      </div>

      <div class="close-btn" onclick="closeSidebar()" aria-label="Close Sidebar">
        <i class="bi bi-x-lg"></i>
      </div>

      <a class="nav-link active" href="/dashboard"><i class="bi bi-grid-fill me-2"></i>Dashboard</a>
      <a class="nav-link" href="/viewPastpaper"><i class="bi bi-file-pdf me-2"></i>Pastpapers</a>
      <a class="nav-link" href="/academic"><i class="bi bi-bank me-2"></i>Academics</a>
      <a class="nav-link" href="/course"><i class="bi bi-list-task me-2"></i>Course</a>
      <a class="nav-link" href="/year"><i class="bi bi-calendar me-2"></i>Year</a>
      <a class="nav-link" href="/subject"><i class="bi bi-book me-2"></i>Subjects</a>
      <a class="nav-link" href="/userUpload"><i class="bi bi-upload me-2"></i>User Upload</a>
      <a class="nav-link" href="/admins"><i class="bi bi-people me-2"></i>Admins</a>
      <a href="/logout"><i class="bi bi-box-arrow-right"></i> <span>Logout</span></a>
    </div>

    <!-- Navbar -->
    <div id="navbar" class="d-flex justify-content-between align-items-center px-3 py-2">
      <div class="d-flex align-items-center">
        <i class="bi bi-list fs-3" onclick="toggleSidebar()" style="cursor:pointer;" aria-label="Toggle Sidebar"></i>
        <span class="ms-3 fs-5">Dashboard</span>
      </div>
      <div class="d-flex align-items-center">
        <i class="bi bi-person-circle fs-4 me-2"></i>
        <span>Admin</span>
      </div>
    </div>

    <!-- Main Content -->
    <div id="main">
      <div class="p-5 ">
        <h4>Welcome, Admin</h4>

  <div class="row justify-content-start g-3">
  <!-- Admins -->
  <div class="col-auto">
    <a href="/admins" class="text-decoration-none">
      <div class="card custom-card text-dark">
        <div class="card-body d-flex flex-column justify-content-center align-items-center">
          <div class="d-flex w-100 justify-content-between align-items-center mb-2">
            <h6 class="card-title text-uppercase fw-bold mb-0">Admins</h6>
            <h1 id="adminCount" class="display-6 fw-bold mb-0">0</h1>
          </div>
        </div>
      </div>
    </a>
  </div>

  <!-- Academics -->
  <div class="col-auto">
    <a href="/academic" class="text-decoration-none">
      <div class="card custom-card text-dark">
        <div class="card-body d-flex flex-column justify-content-center align-items-center">
          <div class="d-flex w-100 justify-content-between align-items-center mb-2">
            <h6 class="card-title text-uppercase fw-bold mb-0">Academics</h6>
            <h1 id="academicCount" class="display-6 fw-bold mb-0">0</h1>
          </div>
        </div>
      </div>
    </a>
  </div>

  <!-- Courses -->
  <div class="col-auto">
    <a href="/course" class="text-decoration-none">
      <div class="card custom-card text-dark">
        <div class="card-body d-flex flex-column justify-content-center align-items-center">
          <div class="d-flex w-100 justify-content-between align-items-center mb-2">
            <h6 class="card-title text-uppercase fw-bold mb-0">Courses</h6>
            <h1 id="courseCount" class="display-6 fw-bold mb-0">0</h1>
          </div>
        </div>
      </div>
    </a>
  </div>

  <!-- Subjects -->
  <div class="col-auto">
    <a href="/subject" class="text-decoration-none">
      <div class="card custom-card text-dark">
        <div class="card-body d-flex flex-column justify-content-center align-items-center">
          <div class="d-flex w-100 justify-content-between align-items-center mb-2">
            <h6 class="card-title text-uppercase fw-bold mb-0">Subjects</h6>
            <h1 id="subjectCount" class="display-6 fw-bold mb-0">0</h1>
          </div>
        </div>
      </div>
    </a>
  </div>

  <!-- Past Papers -->
  <div class="col-auto">
    <a href="/pastpaper" class="text-decoration-none">
      <div class="card custom-card text-dark">
        <div class="card-body d-flex flex-column justify-content-center align-items-center">
          <div class="d-flex w-100 justify-content-between align-items-center mb-2">
            <h6 class="card-title text-uppercase fw-bold mb-0">Past Papers</h6>
            <h1 id="pastpaperCount" class="display-6 fw-bold mb-0">0</h1>
          </div>
        </div>
      </div>
    </a>
  </div>
</div>

    <!-- Footer -->
    <footer class="text-center py-3">
      <div>© 2025 MyCompany</div>
      <div>Logged in as <strong>Admin</strong></div>
    </footer>

  </div> 
</div> 

<!-- Overlay -->
<div id="overlay"></div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="js/script.js"></script>

</body>
</html>
