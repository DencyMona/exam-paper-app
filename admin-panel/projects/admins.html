<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <script src="js/loadPartials.js" defer></script>
  <script src="js/sidebarToggle.js" defer></script>
  <script src="js/admin.js" defer></script>
</head>
<body>

<div class="container-fluid">
  <div class="column">
  
    <div id="sidebar-container"></div>   
    <div id="header-container"></div> 

  <div id="main" class="p-5">
    <!--main-->
    <div class="container mt-5 position-relative">
      
      <div class="d-flex justify-content-end">
          <a href="/viewAdmins" class="btn btn-primary mt-3">View Admins</a>
      </div>
      <h2 class="mb-4 text-center">Add New Admin</h2>
    <div class="card shadow-sm p-4">
      <form id="adminForm">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" id="username" class="form-control" placeholder="Enter username" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter password" required>
        </div>
          <button type="submit" class="btn btn-success">Add Admin</button>
      </form>
    </div>
  </div>
  </div>

    <div id="footer-container"></div>

  </div>
</div>
</body>
</html>
